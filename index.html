<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚦</text></svg>">
  <title>Smart Traffic Signal Optimization</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090d1a;
      --surface: #111827;
      --surface2: #1a2236;
      --border: rgba(255,255,255,0.08);
      --text: #e2e8f0;
      --muted: #6b7280;
      --green: #22d3a0;
      --yellow: #fbbf24;
      --red: #f43f5e;
      --blue: #38bdf8;
      --pink: #ec4899;
      --orange: #fb923c;
      --purple: #a78bfa;
      --road: #1c1f26;
      --road-line: #2d3748;
      --glow-green: 0 0 20px rgba(34,211,160,0.4);
      --glow-yellow: 0 0 20px rgba(251,191,36,0.4);
      --glow-red: 0 0 20px rgba(244,63,94,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .app { position: relative; z-index: 1; }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 28px 16px 16px;
      position: relative;
    }

    .header-badge {
      display: inline-block;
      background: rgba(34,211,160,0.1);
      border: 1px solid rgba(34,211,160,0.3);
      color: var(--green);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
      font-family: 'JetBrains Mono', monospace;
    }

    header h1 {
      font-size: clamp(20px, 4vw, 32px);
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    header p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 12px 16px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 20px;
      text-align: center;
      min-width: 90px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
    }

    .stat-card.active-card::after  { background: var(--green); }
    .stat-card.waiting-card::after { background: var(--yellow); }
    .stat-card.treated-card::after { background: var(--blue); }
    .stat-card.cycle-card::after   { background: var(--purple); }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-family: 'JetBrains Mono', monospace;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      margin-top: 2px;
    }

    .active-card  .stat-value { color: var(--green); }
    .waiting-card .stat-value { color: var(--yellow); }
    .treated-card .stat-value { color: var(--blue); }
    .cycle-card   .stat-value { color: var(--purple); }

    /* ── MAIN LAYOUT ── */
    .main-layout {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 16px;
      padding: 10px 16px;
      flex-wrap: wrap;
    }

    /* ── MANUAL INPUT PANEL ── */
    .input-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      min-width: 200px;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 16px;
      font-family: 'JetBrains Mono', monospace;
    }

    .dir-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .dir-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dir-name {
      font-size: 13px;
      font-weight: 600;
      width: 50px;
      color: var(--text);
    }

    .stepper {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px 8px;
    }

    .step-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all 0.15s;
      line-height: 1;
    }

    .step-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    .step-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      width: 28px;
      text-align: center;
      color: #fff;
    }

    .apply-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--green), #0ea5e9);
      color: #000;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    .apply-btn:hover { opacity: 0.85; transform: translateY(-1px); }

    /* ── INTERSECTION ── */
    .intersection-wrapper {
      flex: 0 0 auto;
    }

    .intersection {
      position: relative;
      width: min(460px, 90vw);
      height: min(460px, 90vw);
    }

    /* Roads */
    .road-h, .road-v {
      position: absolute;
      background: var(--road);
    }

    .road-h {
      top: 50%; left: 0;
      width: 100%; height: 22%;
      transform: translateY(-50%);
    }

    .road-v {
      left: 50%; top: 0;
      height: 100%; width: 22%;
      transform: translateX(-50%);
    }

    /* Dashed center line */
    .road-h::after {
      content: '';
      position: absolute;
      top: 50%; left: 0;
      width: 100%; height: 2px;
      transform: translateY(-50%);
      background: repeating-linear-gradient(90deg, #facc15 0, #facc15 18px, transparent 18px, transparent 36px);
      opacity: 0.3;
    }

    .road-v::after {
      content: '';
      position: absolute;
      left: 50%; top: 0;
      height: 100%; width: 2px;
      transform: translateX(-50%);
      background: repeating-linear-gradient(180deg, #facc15 0, #facc15 18px, transparent 18px, transparent 36px);
      opacity: 0.3;
    }

    /* Lane markings */
    .road-h::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.04) 0%, transparent 30%, transparent 70%, rgba(255,255,255,0.04) 100%);
    }

    /* Intersection box */
    .center-box {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 22%; height: 22%;
      background: #151a24;
      z-index: 2;
      border: 1px solid rgba(255,255,255,0.05);
    }

    /* Crosswalk stripes */
    .crosswalk {
      position: absolute;
      z-index: 3;
    }

    .crosswalk.cw-n {
      bottom: 0; left: 0; right: 0; height: 8px;
      background: repeating-linear-gradient(90deg, rgba(255,255,255,0.12) 0, rgba(255,255,255,0.12) 8px, transparent 8px, transparent 16px);
    }

    .crosswalk.cw-s {
      top: 0; left: 0; right: 0; height: 8px;
      background: repeating-linear-gradient(90deg, rgba(255,255,255,0.12) 0, rgba(255,255,255,0.12) 8px, transparent 8px, transparent 16px);
    }

    .crosswalk.cw-e {
      top: 0; bottom: 0; left: 0; width: 8px;
      background: repeating-linear-gradient(180deg, rgba(255,255,255,0.12) 0, rgba(255,255,255,0.12) 8px, transparent 8px, transparent 16px);
    }

    .crosswalk.cw-w {
      top: 0; bottom: 0; right: 0; width: 8px;
      background: repeating-linear-gradient(180deg, rgba(255,255,255,0.12) 0, rgba(255,255,255,0.12) 8px, transparent 8px, transparent 16px);
    }

    /* ── SIGNALS ── */
    .signal {
      position: absolute;
      z-index: 12;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .signal.north { top: 3%; left: 50%; transform: translateX(-50%); }
    .signal.south { bottom: 3%; left: 50%; transform: translateX(-50%); }
    .signal.east  { right: 3%; top: 50%; transform: translateY(-50%); }
    .signal.west  { left: 3%; top: 50%; transform: translateY(-50%); }

    .signal-box {
      background: #0d1117;
      border: 2px solid #2d3748;
      border-radius: 10px;
      padding: 7px 5px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      align-items: center;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .signal.east .signal-box,
    .signal.west .signal-box {
      flex-direction: row;
      padding: 5px 7px;
    }

    .bulb {
      width: clamp(12px,3vw,18px);
      height: clamp(12px,3vw,18px);
      border-radius: 50%;
      background: #1a1f2e;
      transition: background 0.3s, box-shadow 0.3s;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .bulb.red.on    { background: var(--red);    box-shadow: var(--glow-red); }
    .bulb.yellow.on { background: var(--yellow); box-shadow: var(--glow-yellow); }
    .bulb.green.on  { background: var(--green);  box-shadow: var(--glow-green); }

    .signal.active-signal .signal-box {
      border-color: var(--green);
      box-shadow: 0 0 20px rgba(34,211,160,0.3);
    }

    .signal-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── TIMER RING ── */
    .timer-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 6;
      text-align: center;
    }

    .timer-ring svg { display: block; }

    .timer-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(13px, 2.5vw, 18px);
      font-weight: 700;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── ANIMATED CARS ── */
    .car {
      position: absolute;
      border-radius: 3px;
      z-index: 9;
      transition: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }

    /* Queue panel */
    .queue-panel {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 10px 16px;
    }

    .queue-lane {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      min-width: 105px;
      text-align: center;
    }

    .lane-name {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-family: 'JetBrains Mono', monospace;
    }

    .bar-bg {
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .queue-count {
      font-size: 14px;
      font-weight: 700;
      margin-top: 6px;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Controls */
    .controls {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 12px 16px 28px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: 0.3px;
    }

    .btn-start { background: var(--green); color: #000; }
    .btn-pause { background: var(--yellow); color: #000; }
    .btn-reset { background: var(--red); color: #fff; }
    .btn-add   { background: var(--blue); color: #000; }

    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:active { transform: scale(0.97); }

    /* Algo info */
    .algo-info {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      padding: 4px 16px 10px;
      font-family: 'JetBrains Mono', monospace;
    }

    .algo-info span { color: var(--green); font-weight: 600; }

    /* Pulse animation for active signal */
    @keyframes pulseGreen {
      0%, 100% { box-shadow: 0 0 20px rgba(34,211,160,0.3); }
      50% { box-shadow: 0 0 35px rgba(34,211,160,0.6); }
    }

    .signal.active-signal .signal-box {
      animation: pulseGreen 1.5s ease-in-out infinite;
    }

    /* Car animations */
    @keyframes carMoveN {
      0%   { transform: translateX(-50%) translateY(0); opacity: 1; }
      100% { transform: translateX(-50%) translateY(-200%); opacity: 0; }
    }
    @keyframes carMoveS {
      0%   { transform: translateX(-50%) translateY(0); opacity: 1; }
      100% { transform: translateX(-50%) translateY(200%); opacity: 0; }
    }
    @keyframes carMoveE {
      0%   { transform: translateY(-50%) translateX(0); opacity: 1; }
      100% { transform: translateY(-50%) translateX(200%); opacity: 0; }
    }
    @keyframes carMoveW {
      0%   { transform: translateY(-50%) translateX(0); opacity: 1; }
      100% { transform: translateY(-50%) translateX(-200%); opacity: 0; }
    }

    /* Waiting car gentle bob */
    @keyframes waitBob {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-2px); }
    }

    .queued-car {
      position: absolute;
      border-radius: 4px;
      z-index: 9;
      transition: all 0.4s ease;
    }

    .moving-car {
      position: absolute;
      border-radius: 4px;
      z-index: 11;
    }

    .car-emoji {
      font-size: clamp(10px, 2.5vw, 14px);
      line-height: 1;
    }

    /* Responsive adjustments */
    @media (max-width: 600px) {
      .main-layout { flex-direction: column; align-items: center; }
      .input-panel { width: 100%; max-width: 340px; }
    }
  </style>
</head>
<body>
<div class="app">

<header>
  <div class="header-badge">● LIVE SIM</div>
  <h1>🚦 Smart Traffic Optimizer</h1>
  <p>// greedy algorithm — max queue gets green</p>
</header>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat-card active-card">
    <div class="stat-label">Active</div>
    <div class="stat-value" id="stat-active">—</div>
  </div>
  <div class="stat-card waiting-card">
    <div class="stat-label">Waiting</div>
    <div class="stat-value" id="stat-waiting">0</div>
  </div>
  <div class="stat-card treated-card">
    <div class="stat-label">Passed</div>
    <div class="stat-value" id="stat-treated">0</div>
  </div>
  <div class="stat-card cycle-card">
    <div class="stat-label">Cycle</div>
    <div class="stat-value" id="stat-cycle">1</div>
  </div>
</div>

<!-- Main Layout -->
<div class="main-layout">

  <!-- Input Panel -->
  <div class="input-panel">
    <div class="panel-title">Set Queue</div>

    <div class="dir-input-row">
      <div class="dir-dot" style="background:#38bdf8"></div>
      <div class="dir-name">North</div>
      <div class="stepper">
        <button class="step-btn" onclick="stepDir('N',-1)">−</button>
        <div class="step-val" id="in-N">3</div>
        <button class="step-btn" onclick="stepDir('N',1)">+</button>
      </div>
    </div>

    <div class="dir-input-row">
      <div class="dir-dot" style="background:#ec4899"></div>
      <div class="dir-name">South</div>
      <div class="stepper">
        <button class="step-btn" onclick="stepDir('S',-1)">−</button>
        <div class="step-val" id="in-S">2</div>
        <button class="step-btn" onclick="stepDir('S',1)">+</button>
      </div>
    </div>

    <div class="dir-input-row">
      <div class="dir-dot" style="background:#fb923c"></div>
      <div class="dir-name">East</div>
      <div class="stepper">
        <button class="step-btn" onclick="stepDir('E',-1)">−</button>
        <div class="step-val" id="in-E">5</div>
        <button class="step-btn" onclick="stepDir('E',1)">+</button>
      </div>
    </div>

    <div class="dir-input-row">
      <div class="dir-dot" style="background:#a78bfa"></div>
      <div class="dir-name">West</div>
      <div class="stepper">
        <button class="step-btn" onclick="stepDir('W',-1)">−</button>
        <div class="step-val" id="in-W">1</div>
        <button class="step-btn" onclick="stepDir('W',1)">+</button>
      </div>
    </div>

    <button class="apply-btn" onclick="applyManualQueues()">✓ Apply Queues</button>
  </div>

  <!-- Intersection -->
  <div class="intersection-wrapper">
    <div class="intersection" id="intersection">
      <div class="road-h"></div>
      <div class="road-v"></div>

      <div class="center-box">
        <div class="crosswalk cw-n"></div>
        <div class="crosswalk cw-s"></div>
        <div class="crosswalk cw-e"></div>
        <div class="crosswalk cw-w"></div>
      </div>

      <!-- Signals -->
      <div class="signal north" id="sig-N">
        <div class="signal-box">
          <div class="bulb red" id="N-red"></div>
          <div class="bulb yellow" id="N-yellow"></div>
          <div class="bulb green" id="N-green"></div>
        </div>
        <div class="signal-label">N</div>
      </div>

      <div class="signal south" id="sig-S">
        <div class="signal-label">S</div>
        <div class="signal-box">
          <div class="bulb red" id="S-red"></div>
          <div class="bulb yellow" id="S-yellow"></div>
          <div class="bulb green" id="S-green"></div>
        </div>
      </div>

      <div class="signal east" id="sig-E">
        <div class="signal-box">
          <div class="bulb red" id="E-red"></div>
          <div class="bulb yellow" id="E-yellow"></div>
          <div class="bulb green" id="E-green"></div>
        </div>
        <div class="signal-label">E</div>
      </div>

      <div class="signal west" id="sig-W">
        <div class="signal-box">
          <div class="bulb red" id="W-red"></div>
          <div class="bulb yellow" id="W-yellow"></div>
          <div class="bulb green" id="W-green"></div>
        </div>
        <div class="signal-label">W</div>
      </div>

      <!-- Timer Ring -->
      <div class="timer-ring">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle cx="36" cy="36" r="30" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="5"/>
          <circle cx="36" cy="36" r="30" fill="none" stroke="var(--green)" stroke-width="5"
            stroke-dasharray="188.4" stroke-dashoffset="0"
            stroke-linecap="round"
            transform="rotate(-90 36 36)"
            id="timer-circle"/>
        </svg>
        <div class="timer-text" id="timer-text">—</div>
      </div>

      <!-- Car canvas container -->
      <div id="car-layer" style="position:absolute;inset:0;z-index:10;pointer-events:none;"></div>
    </div>
  </div>
</div>

<!-- Queue Bars -->
<div class="queue-panel">
  <div class="queue-lane">
    <div class="lane-name">North</div>
    <div class="bar-bg"><div class="bar-fill" id="bar-N" style="width:0%;background:#38bdf8;
"></div></div>
    <div class="queue-count" id="count-N">0</div>
  </div>
  <div class="queue-lane">
    <div class="lane-name">South</div>
    <div class="bar-bg"><div class="bar-fill" id="bar-S" style="width:0%;background:#ec4899;"></div></div>
    <div class="queue-count" id="count-S">0</div>
  </div>
  <div class="queue-lane">
    <div class="lane-name">East</div>
    <div class="bar-bg"><div class="bar-fill" id="bar-E" style="width:0%;background:#fb923c;"></div></div>
    <div class="queue-count" id="count-E">0</div>
  </div>
  <div class="queue-lane">
    <div class="lane-name">West</div>
    <div class="bar-bg"><div class="bar-fill" id="bar-W" style="width:0%;background:#a78bfa;"></div></div>
    <div class="queue-count" id="count-W">0</div>
  </div>
</div>
<div class="algo-info">
  <span id="algo-reason">waiting for simulation…</span>
</div>
 
<!-- Controls -->
<div class="controls">
  <button class="btn btn-start" onclick="startSim()">▶ Start</button>
  <button class="btn btn-pause" onclick="pauseSim()">⏸ Pause</button>
  <button class="btn btn-add"   onclick="addRandomCars()">🚗 Add Cars</button>
  <button class="btn btn-reset" onclick="resetSim()">↺ Reset</button>
</div>
 
</div><!-- .app -->
<script>
  // ── STATE ──
  const queues = { N: 3, S: 2, E: 5, W: 1 };
  const manualInputs = { N: 3, S: 2, E: 5, W: 1 };
  const MAX_QUEUE = 10;
  const CIRCUMFERENCE = 2 * Math.PI * 30;
 
  let carsPassed = 0, cycle = 1;
  let currentGreen = null;
  let greenTimer = 0, greenDuration = 0;
  let simRunning = false, intervalId = null, tickCount = 0;
 
  // Car colors per direction
  const DIR_COLOR = { N:'#38bdf8', S:'#ec4899', E:'#fb923c', W:'#a78bfa' };
  const CAR_EMOJIS = ['🚗','🚙','🚕','🏎️','🚓'];
 
  // ── MANUAL INPUT ──
  function stepDir(dir, delta) {
    manualInputs[dir] = Math.max(0, Math.min(MAX_QUEUE, manualInputs[dir] + delta));
    document.getElementById(`in-${dir}`).textContent = manualInputs[dir];
  }
 
  function applyManualQueues() {
    ['N','S','E','W'].forEach(d => { queues[d] = manualInputs[d]; });
    renderQueuedCars();
    updateUI();
    // Flash apply button
const btn = document.querySelector('.apply-btn');
    btn.textContent = '✓ Applied!';
    btn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';
    setTimeout(() => {
      btn.textContent = '✓ Apply Queues';
      btn.style.background = 'linear-gradient(135deg, var(--green), #0ea5e9)';
    }, 1000);
  }
 
  // ── SIGNAL CONTROL ──
  function setSignal(dir, state) {
    ['N','S','E','W'].forEach(d => {
      document.getElementById(`${d}-red`).classList.remove('on');
      document.getElementById(`${d}-yellow`).classList.remove('on');
      document.getElementById(`${d}-green`).classList.remove('on');
      document.getElementById(`sig-${d}`).classList.remove('active-signal');
    });
    ['N','S','E','W'].forEach(d => {
      if (d === dir) {
        document.getElementById(`${d}-${state}`).classList.add('on');
        if (state === 'green') document.getElementById(`sig-${d}`).classList.add('active-signal');
      } else {
document.getElementById(`${d}-red`).classList.add('on');
      }
    });
  }
 
  function greedyPick() {
    return Object.entries(queues).sort((a,b) => b[1]-a[1])[0][0];
  }
 
  // ── CAR RENDERING ──
  const carLayer = document.getElementById('car-layer');
 
  function getIntersectionSize() {
    return document.getElementById('intersection').offsetWidth;
  }
 
  // Returns position for queued cars waiting in a lane
  // We place them in a column/row leading up to the intersection
  function getQueuedCarPos(dir, idx, total, size) {
    const roadW = size * 0.22;
    const center = size / 2;
    const carW = Math.max(12, size * 0.038);
    const carH = Math.max(18, size * 0.058);
    const gap = carH + 4;
const stopLine = center - roadW / 2 - 2;
 
    const laneOffset = roadW * 0.15; // slight offset from center
 
    if (dir === 'N') {
      return {
        left: center + laneOffset - carW/2,
        top: stopLine - idx * gap - carH,
        w: carW, h: carH
      };
    } else if (dir === 'S') {
      const stopS = center + roadW / 2 + 2;
      return {
        left: center - laneOffset - carW/2,
        top: stopS + idx * gap,
        w: carW, h: carH
      };
    } else if (dir === 'E') {
      const stopE = center + roadW / 2 + 2;
      return {
        left: stopE + idx * gap,
        top: center - laneOffset - carW/2,
        w: carH, h: carW
      };
    } else { // W
      const stopW = center - roadW / 2 - 2;
      return {
        left: stopW - idx * gap - carH,
        top: center + laneOffset - carW/2,
        w: carH, h: carW
      };
    }
  }
// Keep track of rendered queued car elements
  let queuedCarEls = { N:[], S:[], E:[], W:[] };
 
  function renderQueuedCars() {
    const size = getIntersectionSize();
    // Remove old
    Object.values(queuedCarEls).flat().forEach(el => el.remove());
    queuedCarEls = { N:[], S:[], E:[], W:[] };
 
    ['N','S','E','W'].forEach(dir => {
      const count = Math.min(queues[dir], 6); // show max 6 in lane
      for (let i = 0; i < count; i++) {
        const pos = getQueuedCarPos(dir, i, count, size);
        const el = document.createElement('div');
        el.className = 'queued-car';
        el.style.cssText = `
          left:${pos.left}px; top:${pos.top}px;
          width:${pos.w}px; height:${pos.h}px;
          background:${DIR_COLOR[dir]};
          border-radius:4px;
          opacity:0.85;
          box-shadow:0 2px 8px ${DIR_COLOR[dir]}66;
        `;
        carLayer.appendChild(el);
        queuedCarEls[dir].push(el);
      }
    });
}
 
  // Animate a car moving through the intersection
  function animateCarThrough(dir) {
    const size = getIntersectionSize();
    const carW = Math.max(12, size * 0.038);
    const carH = Math.max(18, size * 0.058);
    const center = size / 2;
    const roadW = size * 0.22;
    const laneOffset = roadW * 0.15;
 
    const el = document.createElement('div');
    el.className = 'moving-car';
    const color = DIR_COLOR[dir];
    const emoji = CAR_EMOJIS[Math.floor(Math.random() * CAR_EMOJIS.length)];
 
    let startX, startY, endX, endY, w, h;
 
    if (dir === 'N') {
      w = carW; h = carH;
      startX = center + laneOffset - w/2;
      startY = center - roadW/2 - h;
      endX = startX;
      endY = -h - 20;
    } else if (dir === 'S') {
      w = carW; h = carH;
      startX = center - laneOffset - w/2;
      startY = center + roadW/2;
      endX = startX;
endY = size + 20;
    } else if (dir === 'E') {
      w = carH; h = carW;
      startX = center + roadW/2;
      startY = center - laneOffset - h/2;
      endX = size + 20;
      endY = startY;
    } else { // W
      w = carH; h = carW;
      startX = center - roadW/2 - w;
      startY = center + laneOffset - h/2;
      endX = -w - 20;
      endY = startY;
    }
 
    el.style.cssText = `
      left:${startX}px; top:${startY}px;
      width:${w}px; height:${h}px;
      background:${color};
      box-shadow:0 2px 12px ${color}88;
      display:flex;align-items:center;justify-content:center;
      font-size:${Math.max(8,w*0.7)}px;
      border-radius:4px;
      transition: left 0.7s cubic-bezier(0.4,0,0.2,1), top 0.7s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
    `;
    el.textContent = emoji;
    carLayer.appendChild(el);
// Trigger transition
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        el.style.left = endX + 'px';
        el.style.top  = endY + 'px';
        el.style.opacity = '0';
      });
    });
 
    setTimeout(() => el.remove(), 900);
  }
 
  // ── TIMER RING ──
  function updateTimer(remaining, total) {
    const pct = total > 0 ? remaining / total : 0;
    const offset = CIRCUMFERENCE * (1 - pct);
    const circ = document.getElementById('timer-circle');
    circ.style.strokeDashoffset = offset;
    circ.style.stroke = remaining <= 2 ? 'var(--red)' : remaining <= 4 ? 'var(--yellow)' : 'var(--green)';
    document.getElementById('timer-text').textContent = remaining || '—';
  }
 
  // ── UI UPDATE ──
  function updateUI() {
    const total = Object.values(queues).reduce((a,b)=>a+b,0);
    document.getElementById('stat-waiting').textContent = total;
document.getElementById('stat-treated').textContent = carsPassed;
    document.getElementById('stat-cycle').textContent   = cycle;
    document.getElementById('stat-active').textContent  = currentGreen || '—';
 
    ['N','S','E','W'].forEach(d => {
      const q = queues[d];
      const pct = Math.min((q/MAX_QUEUE)*100, 100);
      document.getElementById(`bar-${d}`).style.width = pct+'%';
      document.getElementById(`count-${d}`).textContent = q;
    });
 
    // Sync stepper displays to manual inputs (not queue)
    ['N','S','E','W'].forEach(d => {
      document.getElementById(`in-${d}`).textContent = manualInputs[d];
    });
 
    renderQueuedCars();
  }
 
  // ── TICK ──
  function tick() {
    tickCount++;
    // Random arrivals every 3 ticks
    if (tickCount % 3 === 0) {
      const dirs = ['N','S','E','W'];
      const rDir = dirs[Math.floor(Math.random()*4)];
      if (queues[rDir] < MAX_QUEUE) queues[rDir]++;
    }
 
    if (greenTimer <= 0) {
      if (currentGreen) {
        setSignal(currentGreen, 'yellow');
        setTimeout(() => {
          pickNext();
        }, 700);
      } else {
        pickNext();
      }
    } else {
      // Release 1 car from green lane
      if (queues[currentGreen] > 0) {
        queues[currentGreen]--;
        carsPassed++;
        animateCarThrough(currentGreen);
      }
      greenTimer--;
      updateTimer(greenTimer, greenDuration);
    }
 
    updateUI();
  }
function pickNext() {
    const next = greedyPick();
    currentGreen = next;
    greenDuration = Math.max(3, Math.min(queues[next]*2, 12));
    greenTimer = greenDuration;
    cycle++;
    document.getElementById('algo-reason').textContent =
      `${next} has most cars (${queues[next]}) → green ${greenDuration}s`;
    setSignal(next, 'green');
    updateTimer(greenTimer, greenDuration);
  }
 
  // ── CONTROLS ──
  function startSim() {
    if (simRunning) return;
    simRunning = true;
    intervalId = setInterval(tick, 1000);
  }
 
  function pauseSim() {
    simRunning = false;
    clearInterval(intervalId);
  }
 
  function addRandomCars() {
    ['N','S','E','W'].forEach(d => {
      const add = Math.floor(Math.random()*4)+1;
      queues[d] = Math.min(queues[d]+add, MAX_QUEUE);
manualInputs[d] = queues[d];
    });
    updateUI();
  }
 
  function resetSim() {
    pauseSim();
    queues.N=3; queues.S=2; queues.E=5; queues.W=1;
    manualInputs.N=3; manualInputs.S=2; manualInputs.E=5; manualInputs.W=1;
    carsPassed=0; cycle=1; currentGreen=null;
    greenTimer=0; greenDuration=0; tickCount=0;
    document.getElementById('timer-text').textContent='—';
    document.getElementById('timer-circle').style.strokeDashoffset=0;
    document.getElementById('algo-reason').textContent='waiting for simulation…';
    document.getElementById('stat-active').textContent='—';
    ['N','S','E','W'].forEach(d => {
      ['red','yellow','green'].forEach(c => document.getElementById(`${d}-${c}`).classList.remove('on'));
      document.getElementById(`sig-${d}`).classList.remove('active-signal');
    });
// Clear moving cars
    document.querySelectorAll('.moving-car').forEach(el => el.remove());
    updateUI();
  }
 
  // ── INIT ──
  window.addEventListener('resize', () => renderQueuedCars());
  updateUI();
</script>
</body>
</html>
